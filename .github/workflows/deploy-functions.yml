name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths: [supabase/functions/**]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and deploy
        run: |
          supabase link --project-ref "$PROJECT_REF"
          supabase functions deploy sync-diary --no-verify-jwt
          supabase functions deploy build-user-persona --no-verify-jwt
          supabase functions deploy generate-content --no-verify-jwt
          supabase functions deploy generate-enrichment-question --no-verify-jwt
          supabase functions deploy analyze-creators --no-verify-jwt
          supabase functions deploy generate-image --no-verify-jwt
          supabase functions deploy transcribe-audio --no-verify-jwt
